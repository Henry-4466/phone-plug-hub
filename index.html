<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Plug Hub - Quality Phone Accessories</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        /* Header with Logo */
        header {
            background: #000000;
            padding: 20px 0;
            border-bottom: 3px solid #ff6b00;
            box-shadow: 0 4px 20px rgba(255, 107, 0, 0.3);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff6b00 0%, #ff8533 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 15px rgba(255, 107, 0, 0.4);
        }

        .logo-text h1 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .logo-text h1 span {
            color: #ff6b00;
        }

        .logo-text p {
            color: #00b4d8;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .tagline {
            color: #888;
            font-size: 14px;
            font-style: italic;
        }

        /* Cart Icon */
        .cart-icon {
            position: fixed;
            top: 100px;
            right: 30px;
            background: linear-gradient(135deg, #ff6b00 0%, #ff8533 100%);
            color: white;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 107, 0, 0.4);
            z-index: 1000;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-size: 24px;
        }

        .cart-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(255, 107, 0, 0.6);
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #00b4d8;
            color: white;
            font-size: 12px;
            font-weight: 700;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #000;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Search */
        .search-container {
            margin-bottom: 40px;
            text-align: center;
        }

        #searchInput {
            width: 100%;
            max-width: 600px;
            padding: 18px 30px;
            border: 2px solid #333;
            border-radius: 50px;
            background: #1a1a1a;
            color: white;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        #searchInput:focus {
            border-color: #ff6b00;
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.3);
        }

        #searchInput::placeholder {
            color: #666;
        }

        /* Categories */
        .categories {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .category-btn {
            padding: 12px 28px;
            border: 2px solid #333;
            background: transparent;
            color: #888;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .category-btn:hover,
        .category-btn.active {
            background: linear-gradient(135deg, #ff6b00 0%, #ff8533 100%);
            border-color: #ff6b00;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 107, 0, 0.3);
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: linear-gradient(145deg, #1a1a1a 0%, #0f0f0f 100%);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #333;
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: #ff6b00;
            box-shadow: 0 20px 40px rgba(255, 107, 0, 0.2);
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff6b00, #00b4d8);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .product-card:hover::before {
            opacity: 1;
        }

        .product-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #2a2a2a;
        }

        .product-info {
            padding: 25px;
        }

        .product-info h3 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #fff;
            font-weight: 600;
        }

        .price {
            font-size: 24px;
            font-weight: 700;
            color: #ff6b00;
            margin-bottom: 15px;
        }

        .product-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b00 0%, #ff8533 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
        }

        .product-card button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255, 107, 0, 0.4);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: linear-gradient(145deg, #1a1a1a 0%, #0f0f0f 100%);
            max-width: 600px;
            margin: 50px auto;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #333;
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 32px;
            color: #666;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close:hover {
            color: #ff6b00;
        }

        #modalBody img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 25px;
            background: #2a2a2a;
        }

        #modalBody h2 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #fff;
        }

        #modalBody p {
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        #modalBody .price {
            font-size: 32px;
            margin-bottom: 25px;
        }

        #modalBody button {
            padding: 16px 40px;
            background: linear-gradient(135deg, #ff6b00 0%, #ff8533 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #modalBody button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 107, 0, 0.4);
        }

        /* WhatsApp Float */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }

        .whatsapp-float svg {
            width: 32px;
            height: 32px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .cart-icon {
                top: 20px;
                right: 20px;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 20px;
            }
        }

        /* Loading Animation */
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        .loading {
            animation: shimmer 2s infinite linear;
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 1000px 100%;
        }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <div class="logo-container">
            <img src="images/Logo.png" alt="Phone Plug Hub" style="height: 60px;">
            <div class="logo-text">
                <h1>PHONE <span>PLUG</span> <span style="color: #ff6b00;">HUB</span></h1>
                <p>Accessories & More</p>
            </div>
        </div>
        <p class="tagline">Tested Quality & Approved Products</p>
    </div>
</header>

<div class="cart-icon" onclick="showCart()">
    🛒 <span class="cart-badge">0</span>
</div>

<div class="container">
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="🔍 Search products..." onkeyup="handleSearch()">
    </div>
    
    <div id="categories" class="categories"></div>
    <div id="products" class="products-grid"></div>
</div>

<!-- Product Modal -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>
